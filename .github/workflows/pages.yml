# Publishes web/ (the installable PWA for iOS) to GitHub Pages on every push.
name: Deploy web app

on:
  push:
    branches: [main]
    paths: [web/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # The parse key lives only in the repo secret, never in the tree.
      - name: Inject parse key
        run: sed -i "s/__PARSE_KEY__/${{ secrets.PARSE_KEY }}/" web/app.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
