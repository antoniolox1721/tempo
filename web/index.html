<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tempo</title>
  <meta name="theme-color" content="#14161A">
  <script>
    // Set before the stylesheets apply so the theme never flashes.
    document.documentElement.dataset.theme = localStorage.getItem('tempo.theme') || 'dark';
    if (document.documentElement.dataset.theme === 'light')
      document.querySelector('meta[name="theme-color"]').content = '#F6F2E9';
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tempo">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./splash.css">
</head>
<body>
  <div id="splash" aria-hidden="true">
    <svg viewBox="0 0 96 96" role="img" aria-label="Tempo">
      <defs>
        <clipPath id="splash-top"><path d="M30 20h36L48 47.5Z"/></clipPath>
        <clipPath id="splash-bot"><path d="M48 47.5 66 76H30Z"/></clipPath>
      </defs>
      <g fill="currentColor">
        <rect x="16" y="12" width="64" height="8"/>
        <rect x="26" y="76" width="44" height="8"/>
        <g clip-path="url(#splash-top)"><rect class="sand-top" x="30" y="26" width="36" height="22"/></g>
        <g clip-path="url(#splash-bot)"><rect class="sand-bot" x="30" y="76" width="36" height="20"/></g>
      </g>
      <line class="stream" x1="48" y1="48" x2="48" y2="76" stroke="currentColor" stroke-width="2"/>
      <path d="M30 20 48 47.5 30 76M66 20 48 47.5 66 76" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <header>
    <div class="header-row">
      <h1 aria-label="Tempo"><svg viewBox="0 0 96 96" aria-hidden="true"><g fill="currentColor"><rect x="16" y="12" width="64" height="8"/><rect x="26" y="76" width="44" height="8"/><path d="M39 34h18L48 47.5Z"/><path d="M48 55 64 74H32Z"/></g><path d="M30 20 48 47.5 30 76M66 20 48 47.5 66 76" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>EMPO</span></h1>
      <button id="groups-btn" type="button" aria-label="Groups">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
      </button>
      <button id="theme-btn" type="button" aria-label="Toggle theme">
        <svg class="sun" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="moon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      </button>
      <span id="count-pill" class="count-pill" hidden></span>
    </div>
    <div class="header-date-row">
      <svg id="day-hg" viewBox="0 0 96 96" width="15" height="15" aria-hidden="true"></svg>
      <p id="today-date" class="header-date"></p>
    </div>
  </header>

  <div id="group-bar" class="group-chips" hidden></div>

  <main id="list"></main>

  <div id="hint" class="hint" hidden>
    <p id="hint-text">iOS can’t wake a closed web app, so reminders fire while Tempo is open.
       For system-level alerts, use a task’s 📅 button to add it to Apple Calendar.</p>
    <button id="hint-ok" type="button">Got it</button>
  </div>

  <div id="preview"></div>

  <div id="groups-modal" class="groups-modal" hidden></div>

  <div id="edit-modal" class="groups-modal" hidden></div>

  <footer>
    <div id="suggest" class="suggest" hidden></div>
    <div id="quick-chips" class="quick-chips" hidden>
      <button type="button" data-suffix="in 30 min">in 30 min</button>
      <button type="button" data-suffix="in 1h">in 1h</button>
      <button type="button" data-suffix="tonight">tonight</button>
      <button type="button" data-suffix="tomorrow 9am">tomorrow 9am</button>
    </div>
    <form id="input-bar" class="input-bar" autocomplete="off">
      <input id="input" type="text" placeholder="Remind me to…" enterkeyhint="send" maxlength="300">
      <button id="send" type="submit" class="send" aria-label="Send">
        <svg class="arrow" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5m-6 6 6-6 6 6"/></svg>
        <svg class="mic" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v1a7 7 0 0 0 14 0v-1M12 18v4"/></svg>
        <span class="hg" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <defs>
              <clipPath id="hg-top"><path d="M7 4h10L12 12Z"/></clipPath>
              <clipPath id="hg-bot"><path d="M12 12 17 20H7Z"/></clipPath>
            </defs>
            <g fill="currentColor">
              <g clip-path="url(#hg-top)"><rect class="hg-sand-top" x="7" y="5" width="10" height="7"/></g>
              <g clip-path="url(#hg-bot)"><rect class="hg-sand-bot" x="7" y="20" width="10" height="7"/></g>
            </g>
            <path d="M7 4 12 12 7 20M17 4 12 12 17 20M5.5 3.5h13M5.5 20.5h13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>
    </form>
  </footer>

  <div id="toast" class="toast" role="status"></div>

  <script src="./app.js"></script>
</body>
</html>
